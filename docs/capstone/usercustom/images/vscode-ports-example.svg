  <text x="72" y="430" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" fill="#f3f3f3">Example VS Code Ports view</text>
  <text x="72" y="472" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#d4d4d4">For a real solver engine, forward the solver's actual port, set Visibility to Public,</text>
  <text x="72" y="508" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#d4d4d4">copy the Forwarded Address, and write that URL into BASE_SOLVER_ENGINE_URL in src/.env.</text>
  <text x="72" y="562" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#ce9178">Note: this example shows port 3000 only to illustrate the VS Code workflow.</text>
  <text x="72" y="596" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#ce9178">If your solver listens on port 8000 or another port, forward that port instead.</text>
